# ──────────────────────────────────────────────────────────────
# Microtask Manifest — FEAT-EVA-AGENT (Tri-Brain Agent MVP)
# Phase 4 — Implementation task decomposition
# crosslinks:
#   implements: [BLUEPRINT--brains, BLUEPRINT--tools, BLUEPRINT--memory]
# ──────────────────────────────────────────────────────────────

manifest_id: "FEAT-EVA-AGENT_tri-brain-mvp"
feature: "FEAT-EVA-AGENT"
target_runtime: "node20+ typescript"
blueprint_refs:
  - "gks/blueprints/BLUEPRINT--brains.yaml"
  - "gks/blueprints/BLUEPRINT--tools.yaml"
  - "gks/blueprints/BLUEPRINT--memory.yaml"

# ── Execution order (topological) ──────────────────────────
execution_groups:

  group_1_bootstrap:
    description: "Project scaffold + config + shared types"
    parallel: false
    tasks: [T1, T2, T3]

  group_2_brains:
    description: "Brain adapters (can run in parallel)"
    parallel: true
    tasks: [T4, T5, T6]

  group_3_memory:
    description: "Memory layers (vector depends on embedder)"
    parallel: false
    tasks: [T7, T8, T9, T10]

  group_4_tools:
    description: "Tool registry + safe executors"
    parallel: true
    tasks: [T11, T12, T13, T14]

  group_5_orchestrator:
    description: "Core loop + router + permissions"
    parallel: false
    tasks: [T15, T16, T17]

  group_6_ui:
    description: "Ink TUI (depends on orchestrator events)"
    parallel: false
    tasks: [T18, T19, T20]

# ── Task definitions ───────────────────────────────────────

tasks:

  # ─── Group 1: Bootstrap ───────────────────────────────────
  T1_scaffold-project:
    concern: "สร้างโครงสร้างโฟลเดอร์ + package.json + tsconfig + vitest.config"
    output_files:
      - "eva-cli/package.json"          # update existing
      - "eva-cli/tsconfig.json"
      - "eva-cli/vitest.config.ts"
      - "eva-cli/src/*/*"               # empty dirs with .gitkeep
    depends_on: []
    runner: "human-guided (Cortex plan + human apply)"

  T2_shared-types:
    concern: "นิยาม core types: Session, Message, Intent, Plan, Step, ToolResult"
    output_files:
      - "eva-cli/src/types/session.ts"
      - "eva-cli/src/types/intent.ts"
      - "eva-cli/src/types/plan.ts"
      - "eva-cli/src/types/tool.ts"
    depends_on: [T1_scaffold-project]
    reference: "ENTITY--SESSION-STATE"

  T3_config-loader:
    concern: "โหลด routing.yaml, models.yaml, permissions.yaml + Doppler secrets"
    output_files:
      - "eva-cli/src/config/index.ts"
      - "eva-cli/src/config/routing.yaml"
      - "eva-cli/src/config/models.yaml"
      - "eva-cli/src/config/permissions.yaml"
    depends_on: [T2_shared-types]

  # ─── Group 2: Brains ──────────────────────────────────────
  T4_cortex-adapter:
    concern: "BrainAdapter สำหรับ Opus/Sonnet/Haiku + Gemini + model router"
    output_files:
      - "eva-cli/src/brains/cortex/opus.ts"
      - "eva-cli/src/brains/cortex/gemini.ts"
      - "eva-cli/src/brains/cortex/model-router.ts"
      - "eva-cli/src/brains/cortex/index.ts"
      - "eva-cli/src/prompts/cortex.system.md"
    depends_on: [T2_shared-types, T3_config-loader]
    reference: "BLUEPRINT--brains#cortex"

  T5_motor-adapter:
    concern: "BrainAdapter สำหรับ Qwen ผ่าน Ollama + diff-only output contract"
    output_files:
      - "eva-cli/src/brains/motor/qwen.ts"
      - "eva-cli/src/prompts/motor.system.md"
    depends_on: [T2_shared-types]
    reference: "BLUEPRINT--brains#motor"

  T6_limbic-adapter:
    concern: "BrainAdapter สำหรับ Typhoon + intent extractor (Thai NLU)"
    output_files:
      - "eva-cli/src/brains/limbic/typhoon.ts"
      - "eva-cli/src/brains/limbic/intent-extractor.ts"
      - "eva-cli/src/prompts/limbic.system.md"
    depends_on: [T2_shared-types]
    reference: "BLUEPRINT--brains#limbic"

  # ─── Group 3: Memory ──────────────────────────────────────
  T7_gks-reader:
    concern: "อ่าน atomic_index.jsonl + lookup by id + filter by phase/type"
    output_files:
      - "eva-cli/src/memory/gks.ts"
    depends_on: [T2_shared-types]
    reference: "BLUEPRINT--memory#atomic"

  T8_embedder:
    concern: "Embedder ผ่าน Ollama bge-m3 + fallback OpenAI + batching"
    output_files:
      - "eva-cli/src/memory/vector/embedder.ts"
    depends_on: [T3_config-loader]

  T9_vector-store:
    concern: "JSONL-based vector store + cosine similarity top-K in memory"
    output_files:
      - "eva-cli/src/memory/vector/index.ts"
      - "eva-cli/src/memory/vector/similarity.ts"
    depends_on: [T8_embedder]
    reference: "ADR--FILE-BASED-VECTOR"

  T10_memory-store:
    concern: "Unified MemoryStore: retrieve/search/lookup + episodic writer"
    output_files:
      - "eva-cli/src/memory/index.ts"
      - "eva-cli/src/memory/episodic.ts"
      - "eva-cli/src/memory/consolidator.ts"
      - "eva-cli/src/memory/obsidian-mcp.ts"
    depends_on: [T7_gks-reader, T9_vector-store]
    reference: "BLUEPRINT--memory"

  # ─── Group 4: Tools ───────────────────────────────────────
  T11_tool-types-and-registry:
    concern: "Tool interface + registry + zod schemas + audit logger"
    output_files:
      - "eva-cli/src/tools/types.ts"
      - "eva-cli/src/tools/registry.ts"
      - "eva-cli/src/tools/audit.ts"
    depends_on: [T2_shared-types]

  T12_fs-tools:
    concern: "Read, Write, Edit, Glob, Grep tools (safe, sandboxed, forbidden paths)"
    output_files:
      - "eva-cli/src/tools/fs/read.ts"
      - "eva-cli/src/tools/fs/write.ts"
      - "eva-cli/src/tools/fs/edit.ts"
      - "eva-cli/src/tools/fs/glob.ts"
      - "eva-cli/src/tools/fs/grep.ts"
    depends_on: [T11_tool-types-and-registry]

  T13_bash-tool:
    concern: "Bash tool with blocklist, timeout, child-process kill on abort"
    output_files:
      - "eva-cli/src/tools/bash.ts"
    depends_on: [T11_tool-types-and-registry]

  T14_knowledge-tools:
    concern: "GksSearch, GksLookup, GksPropose, ObsidianSearch (via MCP)"
    output_files:
      - "eva-cli/src/tools/knowledge/gks-search.ts"
      - "eva-cli/src/tools/knowledge/gks-lookup.ts"
      - "eva-cli/src/tools/knowledge/gks-propose.ts"
      - "eva-cli/src/tools/knowledge/obsidian-search.ts"
      - "eva-cli/src/tools/mcp/client.ts"
    depends_on: [T10_memory-store, T11_tool-types-and-registry]

  # ─── Group 5: Orchestrator ────────────────────────────────
  T15_permission-system:
    concern: "Permission modes + tool allow/deny + confirm dialog trigger"
    output_files:
      - "eva-cli/src/orchestrator/permissions.ts"
    depends_on: [T11_tool-types-and-registry]

  T16_router:
    concern: "Task-based router: intent → brain + model selection"
    output_files:
      - "eva-cli/src/orchestrator/router.ts"
    depends_on: [T4_cortex-adapter, T5_motor-adapter, T6_limbic-adapter]
    reference: "ADR--ROUTING-MATRIX"

  T17_react-loop:
    concern: "Core ReAct loop: parse → retrieve → plan → execute → stylize → persist"
    output_files:
      - "eva-cli/src/orchestrator/loop.ts"
      - "eva-cli/src/orchestrator/session.ts"
      - "eva-cli/src/orchestrator/tool-executor.ts"
    depends_on: [T15_permission-system, T16_router, T10_memory-store]
    reference: "FLOW--REACT-LOOP"

  # ─── Group 6: UI ──────────────────────────────────────────
  T18_ink-app-shell:
    concern: "Ink root + layout + session provider + theme"
    output_files:
      - "eva-cli/src/ui/app.tsx"
      - "eva-cli/src/ui/theme.ts"
      - "eva-cli/src/ui/hooks/use-session.ts"
    depends_on: [T17_react-loop]
    reference: "ADR--TUI-INK-STACK"

  T19_ink-panels:
    concern: "ChatPanel, ContextPanel, BrainActivity, ToolCall, PermissionDialog"
    output_files:
      - "eva-cli/src/ui/components/ChatPanel.tsx"
      - "eva-cli/src/ui/components/ContextPanel.tsx"
      - "eva-cli/src/ui/components/BrainActivity.tsx"
      - "eva-cli/src/ui/components/ToolCall.tsx"
      - "eva-cli/src/ui/components/PermissionDialog.tsx"
    depends_on: [T18_ink-app-shell]

  T20_cli-entry:
    concern: "bin/eva.js replacement: TTY detect → Ink or fallback CLI"
    output_files:
      - "eva-cli/bin/eva.js"               # replace existing
      - "eva-cli/src/lib/tty-detect.ts"
    depends_on: [T19_ink-panels]

# ── Acceptance Criteria (MVP done when) ────────────────────
mvp_acceptance:
  - "eva → เปิด TUI ได้, พิมพ์ภาษาไทยแล้ว LIMBIC classify intent"
  - "คำถาม 'ช่วยเขียน function X' → CORTEX plan → MOTOR write → ผลลัพธ์มาเป็น diff"
  - "คำถาม 'เคยคุยเรื่องอะไรเมื่อวาน' → ดึง episodic → ตอบเป็นไทย"
  - "ทุก tool เสี่ยงต้องผ่าน permission prompt"
  - "exit → episodic memory file ถูกสร้าง + atomic_index ได้ proposal"
  - "Unit tests ผ่านอย่างน้อย 80% coverage บน orchestrator + memory"

# ── Estimated effort ────────────────────────────────────────
effort_estimate:
  total_hours: "40-60"
  critical_path: [T1, T2, T11, T15, T17, T18]
  critical_path_hours: "20-25"
