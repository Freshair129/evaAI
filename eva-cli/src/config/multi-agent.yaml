default_mode: single_shot

mode_rules:
  - condition:
      task_type: [write_adr, plan_architecture]
    mode: debate
    rounds: 3
  - condition:
      task_type: [code_generate]
      has_sub_tasks: true
    mode: parallel
  - condition:
      task_type: [knowledge_search, knowledge_recall]
    mode: pipeline
    pipeline: default_retrieval_pipeline

confidence_escalation:
  low_threshold: 0.6
  force_debate_threshold: 0.4
  cache_on_high: 0.9
  cache_ttl_hours: 24

scoring:
  weights:
    skill_match: 0.40
    past_success: 0.30
    latency_pref: -0.15
    cost_pref: -0.10
    freshness: 0.05

budgets:
  single_shot_max_ms: 15000
  parallel_max_ms: 30000
  debate_max_rounds: 3
  debate_max_ms: 60000
  pipeline_max_ms: 45000

pipelines:
  default_retrieval_pipeline:
    - { role: retriever, agent: MSP-AGT-EVA-COWORK }
    - { role: reasoner, agent: MSP-AGT-EVA-COWORK }
    - { role: formatter, agent: MSP-AGT-EVA-COWORK }
